name: Feature Request
description: Suggest a new feature or improvement
title: "[Feature]: "
labels: ["enhancement"]

body:
  - type: markdown
    attributes:
      value: |
        Thanks for suggesting a feature! Please describe it clearly.

  - type: dropdown
    id: page
    attributes:
      label: Related Page / Route
      options:
        - Homepage (/)
        - KYL Dashboard (/kyl_dashboard)
        - Landscape Explorer (/download_layers)
        - Agrohorticulture (/agrohorticulture)
        - RWB Dashboard (/rwb)
        - CC Usage Page (/CCUsagePage)
        - Plan View (/plan-view)
        - Entire Application
        - Other

  - type: textarea
    id: feature_description
    attributes:
      label: Feature Description
      description: What feature would you like to see?
    validations:
      required: true

  - type: textarea
    id: problem
    attributes:
      label: Problem it Solves
      description: Why is this feature needed?

  - type: textarea
    id: implementation
    attributes:
      label: Suggested Implementation
      description: How could this feature be implemented?
      placeholder: |
        Example:
        - Add new filter in the left panel
        - Add layer toggle in map controls
        - Update API endpoint

  - type: textarea
    id: mockups
    attributes:
      label: Mockups / Screenshots
      description: Upload any UI ideas or diagrams.